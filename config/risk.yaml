# Keystone — portfolio budgets + stress (Stage 8 consumes these).
#
# Trading budgets are per $100k NLV. Two pools, separate budgets. Defaults
# mirror the design-doc doctrine; tune to your own risk tolerance.

trading:
  max_loss_per_position_pct: 1.0     # defined-risk max-loss per position <= 1%
  aggregate_short_premium_pct: 6.0   # aggregate short-premium risk cap
  trend_sleeve_cap_pct: 5.0          # long-premium trend sleeve aggregate ceiling
  max_positions: 6
  max_names_per_sector: 2
  correlation_cap: 0.7

smsf:
  csp_cash_reserve_cap_pct: 60.0     # max % of SMSF NLV reserved to open CSPs
  core_notional_cap_pct: 100.0
  assignment_notional_single_pct: 12.0   # per single name
  assignment_notional_etf_pct: 25.0      # per diversified ETF
  collar_hedge_allowance_pct: 5.0
  max_names_per_sector: 2

stress:
  market_spot_shock: -0.05           # -5% spot
  market_iv_shock: 10.0              # IV +10 (vol points)
  market_horizon_days: 2
  worst_name_gap: -0.15              # -15% single-name gap
  worst_name_iv_shock: 15.0          # IV +15
  earnings_implied_move_mult: 1.5    # +/-1.5x implied move inside an earnings window
  weekly_pnl_ceiling: null           # USER: calibrate to THIS book's weekly/monthly P&L
  severe_spot_shock: -0.20           # v2 severe tail: -20% overnight gap
  severe_iv_shock: 30.0              # IV +30 (vol points)
  severe_horizon_days: 1             # overnight

# Optional read-only ingest of external index-book positions (off by default).
index_book_ingest:
  enabled: false
  source: null

# v2 portfolio governor — the spine above portfolio that makes leverage
# survivable. Vol-targets the whole book and applies a tiered drawdown
# circuit-breaker; the leverage allocator (Stage 16) sizes engines to the
# severe-tail DD budget, gated by these.
governor:
  portfolio_vol_target_annual: 0.13  # 13% annualized whole-book vol target
  thresholds:
    dd_warn: 0.10                    # begin linear de-lever
    dd_delever: 0.15                 # hedge-heavy + cut Engines 1-2
    dd_defensive: 0.20               # close/hedge; no risk-on until recovery
    reentry_recovery_margin: 0.03    # anti-whipsaw: recover this far above the line
  leverage:
    gross_notional_ceiling: 2.25     # hard backstop (risk-based cap is primary)
    min_exposure_scalar: 0.0
    max_exposure_scalar: 2.25
